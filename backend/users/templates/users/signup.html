<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
</head>
<body>

<h2>Signup</h2>

{% if error %}
<p Style="color:red">{{error}}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <label>Username</label>
    <input type="text" name="username" required>

    <br><br>

    <label>Password</label>
    <input type="password" name="password" required>

    <br><br>

    <button type="submit">Signup</button>

</form>

<a href="/">Back to Login</a>

</body>
</html>
