{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SenpaiLog | Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/loginstyle.css' %}?v=2">
</head>

<body>

    <canvas id="shurikenCanvas"></canvas>

    <img class="bg-char" src="{% static 'images/loginimage.jpg' %}" alt="character">

    <div class="fade-left"></div>

    <div class="login-container">
        
        <div class="screentone-tape"></div>

        <h2>SenpaiLog</h2>

        {% if error %}
        <div class="error-panel">
            <p><strong>NANI?!</strong> {{ error }}</p>
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="your_username">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit">Enter Realm</button>
        </form>

        <p class="signup-text">
            Don't have an account? <br>
            <a href="{% url 'signup' %}">Signup for the Guild ➔</a>
        </p>

    </div>

{% comment %}
drawing graphics using Canvas API   
{% endcomment %}
     
<script>
const canvas = document.getElementById("shurikenCanvas");
const ctx    = canvas.getContext("2d");

canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
});

function drawShuriken(ctx, x, y, size, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    ctx.beginPath();
    const outerR = size;
    const innerR = size * 0.38;
    for (let i = 0; i < 8; i++) {
        const r     = i % 2 === 0 ? outerR : innerR;
        const theta = (i * Math.PI) / 4 - Math.PI / 4;
        ctx.lineTo(Math.cos(theta) * r, Math.sin(theta) * r);
    }
    ctx.closePath();

    const grad = ctx.createRadialGradient(0, 0, innerR * 0.2, 0, 0, outerR);
    grad.addColorStop(0,   "#ff2222");
    grad.addColorStop(0.5, "#cc0000");
    grad.addColorStop(1,   "#7a0000");
    ctx.fillStyle   = grad;
    ctx.fill();
    ctx.strokeStyle = "#550000";
    ctx.lineWidth   = 1.2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0, 0, size * 0.18, 0, Math.PI * 2);
    ctx.fillStyle   = "#1a0000";
    ctx.fill();
    ctx.strokeStyle = "#880000";
    ctx.lineWidth   = 1;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0, -outerR * 0.65);
    ctx.lineTo(0, -outerR * 0.3);
    ctx.strokeStyle = "rgba(255,100,100,0.7)";
    ctx.lineWidth   = 1.5;
    ctx.lineCap     = "round";
    ctx.stroke();

    ctx.restore();
}

const shurikens = [];
for (let i = 0; i < 22; i++) {
    shurikens.push({
        x:       Math.random() * window.innerWidth,
        y:       -Math.random() * window.innerHeight,
        size:    12 + Math.random() * 16,
        speed:   1.2 + Math.random() * 2.5,
        spin:    (Math.random() - 0.5) * 0.12,
        angle:   Math.random() * Math.PI * 2,
        opacity: 0.55 + Math.random() * 0.45,
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    shurikens.forEach(s => {
        ctx.globalAlpha = s.opacity;
        drawShuriken(ctx, s.x, s.y, s.size, s.angle);
        s.y     += s.speed;
        s.angle += s.spin;
        if (s.y > canvas.height + 40) {
            s.y = -40;
            s.x = Math.random() * canvas.width;
        }
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
